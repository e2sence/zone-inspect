# /etc/nginx/sites-available/pcb-inspect

# Rate limiting
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=upload:10m rate=5r/s;

server {
    listen 80;
    server_name inspect.metaprodtrace.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name inspect.metaprodtrace.com;

    # SSL — managed by certbot (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/inspect.metaprodtrace.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/inspect.metaprodtrace.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Upload limits (match Flask MAX_CONTENT_LENGTH)
    client_max_body_size 128M;

    # Proxy to gunicorn
    location / {
        limit_req zone=api burst=50 nodelay;

        proxy_pass http://127.0.0.1:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for ML inference
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Stricter rate limit on photo uploads
    location ~ ^/api/(upload_photo|mobile/.*/zone_photo) {
        limit_req zone=upload burst=10 nodelay;

        proxy_pass http://127.0.0.1:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Static files (if static/ directory exists)
    location /static/ {
        alias /opt/pcb-inspect/static/;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }
}
