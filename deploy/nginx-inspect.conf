# /etc/nginx/sites-available/inspect.metaprodtrace.com
# PCB Inspect — added alongside existing metaprodtrace.com Node app

server {
    listen 80;
    listen [::]:80;
    server_name inspect.metaprodtrace.com;

    # Allow certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name inspect.metaprodtrace.com;

    # SSL — will be filled by certbot
    ssl_certificate /etc/letsencrypt/live/inspect.metaprodtrace.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/inspect.metaprodtrace.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Upload limits (photos up to 128MB)
    client_max_body_size 128M;

    location / {
        proxy_pass http://127.0.0.1:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for ML inference
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
