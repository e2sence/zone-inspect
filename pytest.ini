[pytest]
testpaths = tests
addopts = -v --tb=short
markers =
    unit: Pure helper/function tests (no HTTP)
    api: Flask API endpoint tests
    auth: Authentication & authorization
    mobile: Mobile workflow (QR, tokens, photos)
    templates: Template CRUD (requires MongoDB)
    api_v1: External API v1 (requires MongoDB)
    edge: Edge cases & robustness
    mongo: Requires MongoDB connection
